        <p><strong>镜像操作</strong></p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div></pre></td><td class="code"><pre><div class="line"><span class="comment"># 查找镜像</span></div><div class="line"><span class="variable">$docker</span> search image_name</div><div class="line"></div><div class="line"><span class="comment"># 下载镜像</span></div><div class="line"><span class="variable">$docker</span> pull image_name</div><div class="line"></div><div class="line"><span class="comment"># 发布镜像</span></div><div class="line"><span class="variable">$docker</span> push image_name</div><div class="line"></div><div class="line"><span class="comment"># 显示镜像列表</span></div><div class="line"><span class="variable">$docker</span> images</div><div class="line"></div><div class="line"><span class="comment"># 删除镜像</span></div><div class="line"><span class="variable">$docker</span> rmi images</div><div class="line"><span class="comment">#-f 强行删除</span></div><div class="line"></div><div class="line"><span class="comment"># 显示一个镜像的历史信息</span></div><div class="line"><span class="variable">$docker</span> <span class="built_in">history</span> image_name</div><div class="line"></div><div class="line"><span class="comment"># 查看镜像参数</span></div><div class="line"><span class="variable">$docker</span> inspect id/name:&lt;tag&gt;</div><div class="line"></div><div class="line"><span class="comment"># 修改镜像tag</span></div><div class="line"><span class="variable">$docker</span> tag id/name:&lt;tag&gt; name:tag</div><div class="line"></div><div class="line"></div><div class="line"><span class="comment"># 镜像保存</span></div><div class="line"><span class="variable">$docker</span> save id/name:&lt;tag&gt; &gt; /home/name.tar</div><div class="line"></div><div class="line"><span class="comment"># 导入镜像</span></div><div class="line"><span class="variable">$docker</span> load &lt; /home/name.tar</div></pre></td></tr></table></figure>
<a id="more"></a>
<hr>
<p><strong>启动容器</strong></p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div></pre></td><td class="code"><pre><div class="line"><span class="comment"># 交互式进入启动容器</span></div><div class="line"><span class="variable">$docker</span> run -t -i centos /bin/bash</div><div class="line"><span class="comment">#-t 表示打开一个客户端</span></div><div class="line"><span class="comment">#-i 表示发送返回信息到客户端</span></div><div class="line"></div><div class="line"><span class="comment"># 服务式启动容器</span></div><div class="line"><span class="variable">$docker</span> run -d --name conname -p 58080:8080 -v /opt/app/logs:/opt/app/work/app1 imagename</div><div class="line"><span class="comment">#-d 后台启动镜像</span></div><div class="line"><span class="comment">#-p 将容器8080端口映射到本机58080端口</span></div><div class="line"><span class="comment">#-v 将容器/opt/app/logs目录映射到主机/opt/app/work/app1目录</span></div><div class="line"><span class="comment">#--name 容器运行名称</span></div></pre></td></tr></table></figure>
<hr>
<p><strong>构建镜像</strong></p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line"><span class="variable">$docker</span> build -t imagename Dockerfile_path</div></pre></td></tr></table></figure>
<hr>
<p><strong>容器操作</strong></p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div></pre></td><td class="code"><pre><div class="line"><span class="comment"># 查看运行中的容器</span></div><div class="line"><span class="variable">$docker</span> ps</div><div class="line"></div><div class="line"><span class="comment"># 查看所有容器</span></div><div class="line"><span class="variable">$docker</span> ps -a</div><div class="line"></div><div class="line"><span class="comment"># 查看最近一次启动的容器</span></div><div class="line"><span class="variable">$docker</span> ps -l</div><div class="line"></div><div class="line"></div><div class="line"><span class="comment"># 启动、停止、杀死、重启一个容器</span></div><div class="line"><span class="variable">$docker</span> start id/name:&lt;tag&gt;</div><div class="line"><span class="variable">$docker</span> stop id/name:&lt;tag&gt;</div><div class="line"><span class="variable">$docker</span> <span class="built_in">kill</span> id/name:&lt;tag&gt;</div><div class="line"><span class="variable">$docker</span> restart id/name:&lt;tag&gt;</div><div class="line"></div><div class="line"><span class="comment"># 查看容器运行日志</span></div><div class="line"><span class="variable">$docker</span> logs id/name:&lt;tag&gt;</div><div class="line"></div><div class="line"><span class="comment"># 列出容器中改变了的文件或目录</span></div><div class="line"><span class="variable">$docker</span> diff id/name:&lt;tag&gt;</div><div class="line"></div><div class="line"><span class="comment"># 附加到一个运行的容器上</span></div><div class="line"><span class="variable">$docker</span> attach id</div><div class="line"></div><div class="line"><span class="comment"># 进入一个正在运行的容器</span></div><div class="line"><span class="variable">$docker</span> <span class="built_in">exec</span> -it id</div><div class="line"></div><div class="line"><span class="comment"># 显示运行中容器的进程信息</span></div><div class="line"><span class="variable">$docker</span> top id/name:&lt;tag&gt;</div><div class="line"></div><div class="line"><span class="comment"># 删除容器</span></div><div class="line"><span class="variable">$docker</span> rm id/name:&lt;tag&gt;</div><div class="line"></div><div class="line"><span class="comment"># 删除所有容器</span></div><div class="line"><span class="variable">$docker</span> rm `docker ps -a -q`</div><div class="line"></div><div class="line"><span class="comment"># 删除Exited的container</span></div><div class="line"><span class="variable">$docker</span> ps -a | grep Exited |awk <span class="string">'&#123;print $1&#125;'</span> | xargs docker rm</div></pre></td></tr></table></figure>
